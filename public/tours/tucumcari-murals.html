function initMap() {
  const map = new mapkit.Map("map", {
    center: new mapkit.Coordinate(35.172, -103.724),
    cameraDistance: 10000,
    colorScheme: mapkit.Map.ColorSchemes.Dark,
  });

  const annotations = murals.map((m, i) => {
    const coord = new mapkit.Coordinate(m.lat, m.lon);
    const ann = new mapkit.MarkerAnnotation(coord, {
      title: m.name,
      subtitle: m.desc,
      color: "#e84545",
      glyphText: "🎨",
    });
    ann.addEventListener("select", () => {
      document.querySelectorAll(".mural")[i]?.scrollIntoView({behavior:"smooth", block:"center"});
    });
    return ann;
  });

  map.addAnnotations(annotations);

  // Build list
  const list = document.getElementById("mural-list");
  murals.forEach((m, i) => {
    const div = document.createElement("div");
    div.className = "mural";
    div.innerHTML = '<div><div class="name">' + m.name + '</div><div class="loc">' + m.desc + '</div></div><a href="https://maps.apple.com/?daddr=' + m.lat + ',' + m.lon + '&dirflg=w">Directions</a>';
    div.addEventListener("click", (e) => {
      if (e.target.tagName === "A") return;
      map.setCenterAnimated(new mapkit.Coordinate(m.lat, m.lon));
      map.setCameraDistanceAnimated(2000);
      annotations[i].selected = true;
    });
    list.appendChild(div);
  });
}
