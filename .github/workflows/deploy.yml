name: Deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - "index.json"
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: public-repo

      - name: Checkout public content
        uses: actions/checkout@v4
        with:
          repository: trsvax/theTube-content
          path: content-repo

      - name: Checkout private content
        uses: actions/checkout@v4
        with:
          repository: trsvax/theTube-private
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          path: private-repo

      - name: Merge content and private assets
        run: |
          cp -r content-repo/content public-repo/content
          cp -r private-repo/public/fonts public-repo/public/fonts
          cp -r private-repo/public/protected public-repo/public/protected
          cp -r private-repo/content/posts/. public-repo/content/posts/

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: public-repo/package-lock.json

      - name: Install
        run: npm ci
        working-directory: public-repo

      - name: Capture commit SHAs
        run: |
          echo "COMMIT_APP=$(git -C public-repo rev-parse --short HEAD)" >> $GITHUB_ENV
          echo "COMMIT_CONTENT=$(git -C content-repo rev-parse --short HEAD)" >> $GITHUB_ENV
          echo "COMMIT_PRIVATE=$(git -C private-repo rev-parse --short HEAD)" >> $GITHUB_ENV

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Set build time
        id: build-time
        run: echo "time=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_OUTPUT

      - name: Build
        working-directory: public-repo
        run: npm run build
        env:
          BUILD_TIME: ${{ steps.build-time.outputs.time }}

      - name: Sync to S3
        working-directory: public-repo
        run: aws s3 sync out/ s3://${{ secrets.S3_BUCKET }} --delete

      - name: Fix content-type for SVG placeholders
        working-directory: public-repo
        run: |
          find out/images/posts -name "*.png" 2>/dev/null | while read f; do
            if head -c 5 "$f" | grep -q "<svg"; then
              key="${f#out/}"
              aws s3 cp "$f" "s3://${{ secrets.S3_BUCKET }}/$key" \
                --content-type "image/svg+xml" --metadata-directive REPLACE
              echo "Fixed content-type: $key"
            fi
          done

      - name: Deploy CloudFront short-URL function
        working-directory: public-repo
        run: |
          set -euo pipefail
          echo "=== Deploying cf-short-urls.js ==="
          cat cf-short-urls.js

          DEV_ETAG=$(aws cloudfront describe-function \
            --name short-url-redirects \
            --stage DEVELOPMENT \
            --query 'ETag' --output text 2>/dev/null || echo "")

          if [ -z "$DEV_ETAG" ]; then
            echo "Creating new function..."
            aws cloudfront create-function \
              --name short-url-redirects \
              --function-config Comment="Short URL redirects",Runtime="cloudfront-js-2.0" \
              --function-code fileb://cf-short-urls.js
            DEV_ETAG=$(aws cloudfront describe-function \
              --name short-url-redirects \
              --stage DEVELOPMENT \
              --query 'ETag' --output text)
          else
            echo "Updating existing function (ETAG: $DEV_ETAG)..."
            aws cloudfront update-function \
              --name short-url-redirects \
              --function-config Comment="Short URL redirects",Runtime="cloudfront-js-2.0" \
              --function-code fileb://cf-short-urls.js \
              --if-match "$DEV_ETAG"
            DEV_ETAG=$(aws cloudfront describe-function \
              --name short-url-redirects \
              --stage DEVELOPMENT \
              --query 'ETag' --output text)
          fi

          echo "Publishing to LIVE (ETAG: $DEV_ETAG)..."
          aws cloudfront publish-function \
            --name short-url-redirects \
            --if-match "$DEV_ETAG"
          echo "=== Function deployed ==="

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"

      - name: Log deploy
        run: curl -s 'https://thetube.today/events/deploy/done?app=${{ env.COMMIT_APP }}&content=${{ env.COMMIT_CONTENT }}&private=${{ env.COMMIT_PRIVATE }}'
