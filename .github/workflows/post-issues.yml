name: Post Issues

on:
  push:
    branches: [main]
    paths:
      - "content/posts/**.md"

jobs:
  sync-issues:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync post issues
        uses: actions/github-script@v7
        with:
          script: |
            const { execSync } = require("child_process");
            const fs = require("fs");
            const path = require("path");

            // Parse YAML frontmatter (no external deps)
            function parseFrontmatter(content) {
              const match = content.match(/^---\n([\s\S]*?)\n---/);
              if (!match) return {};
              const fm = {};
              for (const line of match[1].split("\n")) {
                const [key, ...rest] = line.split(":");
                if (!key || !rest.length) continue;
                const val = rest.join(":").trim().replace(/^['"]|['"]$/g, "");
                if (val.startsWith("[")) {
                  fm[key.trim()] = val.slice(1, -1).split(",").map(s => s.trim());
                } else {
                  fm[key.trim()] = val;
                }
              }
              return fm;
            }

            // Files changed in this push
            const changed = execSync("git diff --name-only HEAD~1 HEAD")
              .toString().trim().split("\n")
              .filter(f => f.startsWith("content/posts/") && f.endsWith(".md"));

            const filesToCommit = [];

            for (const file of changed) {
              const slug = path.basename(file, ".md");
              const content = fs.readFileSync(file, "utf8");
              const fm = parseFrontmatter(content);

              const slugLabel = `post:${slug}`;
              const audienceLabel = fm.audience === "public" ? "post-published" : "post-draft";
              const tagLabels = Array.isArray(fm.tags) ? fm.tags : [];
              const labels = [slugLabel, audienceLabel, ...tagLabels];

              // Ensure all labels exist
              for (const label of [...labels, "post-tracking", "discussion", "design"]) {
                try {
                  await github.rest.issues.getLabel({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    name: label,
                  });
                } catch {
                  await github.rest.issues.createLabel({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    name: label,
                    color: label.startsWith("post:") ? "0075ca"
                      : label === "post-published" ? "0e8a16"
                      : label === "post-draft" ? "e4e669"
                      : label === "post-tracking" ? "d4c5f9"
                      : label === "discussion" ? "c2e0c6"
                      : "ededed",
                  });
                }
              }

              // Check if an issue already exists for this slug
              const existing = await github.rest.issues.listForRepo({
                owner: context.repo.owner,
                repo: context.repo.repo,
                labels: slugLabel,
                state: "all",
              });

              if (existing.data.length > 0) {
                // Update labels (audience may have changed draft→published)
                const issue = existing.data[0];
                const currentLabels = issue.labels.map(l => l.name);
                const toAdd = labels.filter(l => !currentLabels.includes(l));
                const toRemove = currentLabels.filter(
                  l => (l === "post-draft" || l === "post-published") && !labels.includes(l)
                );
                for (const l of toAdd) {
                  await github.rest.issues.addLabels({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: issue.number,
                    labels: [l],
                  });
                }
                for (const l of toRemove) {
                  await github.rest.issues.removeLabel({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: issue.number,
                    name: l,
                  });
                }
                console.log(`Updated issue #${issue.number} for ${slug}`);

                // Process any new [design]: blocks not yet tracked
                const parentNumber = issue.number;
                const postBody = content.replace(/^---\n[\s\S]*?\n---\n/, "");
                const designBlocks = [];
                const bodyLines = postBody.split("\n");
                let bi = 0;
                while (bi < bodyLines.length) {
                  const dm = bodyLines[bi].match(/^\[design\]:\s*(.+)$/);
                  if (dm) {
                    const firstLine = dm[1].trim();
                    const extra = [];
                    bi++;
                    while (bi < bodyLines.length && bodyLines[bi].trim() !== "") {
                      extra.push(bodyLines[bi].trim());
                      bi++;
                    }
                    designBlocks.push({ firstLine, extra });
                  } else {
                    bi++;
                  }
                }

                if (designBlocks.length > 0) {
                  const existingDesign = await github.rest.issues.listForRepo({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    labels: `${slugLabel},design`,
                    state: "all",
                    per_page: 100,
                  });
                  const existingTitles = new Set(existingDesign.data.map(i => i.title));

                  for (const block of designBlocks) {
                    const firstToken = block.firstLine.split(/[\s\u2014\u2013]/)[0];
                    const filename = firstToken.includes(".") ? firstToken : null;
                    const description = filename
                      ? block.firstLine.slice(filename.length).replace(/^\s*[\u2014\u2013-]\s*/, "")
                      : block.firstLine;
                    const fullBrief = [description, ...block.extra].filter(Boolean).join("\n");
                    const deliveryPath = filename
                      ? `public/images/posts/${slug}/${filename}`
                      : `public/images/posts/${slug}/`;
                    const issueTitle = `[design] ${filename || description}`;

                    if (existingTitles.has(issueTitle)) {
                      const existingIssue = existingDesign.data.find(i => i.title === issueTitle);
                      const briefMatch = existingIssue?.body?.match(/## Brief\n([\s\S]*?)\n\n## Delivery/);
                      const existingBrief = briefMatch ? briefMatch[1].trim() : "";
                      if (existingBrief === fullBrief) {
                        console.log(`Design issue unchanged: ${issueTitle}`);
                        continue;
                      }
                      // Brief changed — update issue body
                      await github.rest.issues.update({
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        issue_number: existingIssue.number,
                        body: [
                          `Design request for: #${parentNumber}`,
                          "",
                          "## Brief",
                          fullBrief,
                          "",
                          "## Delivery",
                          "Attach the file to this issue as a comment. Commit it to:",
                          `\`${deliveryPath}\``,
                          "",
                          "Close this issue when the file is committed.",
                        ].join("\n"),
                      });
                      console.log(`Updated design issue #${existingIssue.number} with new brief`);
                      // Regen SVG only if still a placeholder — real image not yet delivered
                      if (filename && fs.existsSync(deliveryPath)) {
                        const current = fs.readFileSync(deliveryPath, "utf8");
                        if (current.trimStart().startsWith("<svg")) {
                          fs.unlinkSync(deliveryPath); // remove so regen runs below
                        } else {
                          continue; // real image delivered, don't touch it
                        }
                      }
                    } else {

                    const designIssue = await github.rest.issues.create({
                      owner: context.repo.owner,
                      repo: context.repo.repo,
                      title: issueTitle,
                      body: [
                        `Design request for: #${parentNumber}`,
                        "",
                        "## Brief",
                        fullBrief,
                        "",
                        "## Delivery",
                        "Attach the file to this issue as a comment. Commit it to:",
                        `\`${deliveryPath}\``,
                        "",
                        "Close this issue when the file is committed.",
                      ].join("\n"),
                      labels: [slugLabel, "design", ...tagLabels],
                    });
                    console.log(`Created design issue #${designIssue.data.number}: ${block.firstLine}`);
                    } // end else (new issue)

                    if (filename && !fs.existsSync(deliveryPath)) {
                      const dimMatch = fullBrief.match(/(\d+)[x\u00d7](\d+)/i);
                      const w = dimMatch ? parseInt(dimMatch[1]) : 1200;
                      const h = dimMatch ? parseInt(dimMatch[2]) : 630;
                      const escape = s => s.replace(/[<>&"]/g, c => ({ "<": "&lt;", ">": "&gt;", "&": "&amp;", '"': "&quot;" }[c]));
                      const briefText = escape(fullBrief.replace(/\n/g, " "));
                      const words = briefText.split(" ");
                      const briefLines = [];
                      let ln = "";
                      for (const word of words) {
                        if ((ln + " " + word).trim().length > 55) { briefLines.push(ln.trim()); ln = word; }
                        else { ln = (ln + " " + word).trim(); }
                      }
                      if (ln) briefLines.push(ln);
                      const lineH = Math.round(h / 18);
                      const startY = Math.round(h / 2) - Math.round((briefLines.length - 1) * lineH / 2);
                      const textEls = briefLines.map((l, i) =>
                        `  <text x="${w / 2}" y="${startY + i * lineH}" text-anchor="middle" font-family="sans-serif" font-size="${Math.round(lineH * 0.7)}" fill="#888">${l}</text>`
                      ).join("\n");
                      const svg = [
                        `<svg xmlns="http://www.w3.org/2000/svg" width="${w}" height="${h}" viewBox="0 0 ${w} ${h}">`,
                        `  <rect width="${w}" height="${h}" fill="#f5f5f5"/>`,
                        `  <rect x="4" y="4" width="${w - 8}" height="${h - 8}" fill="none" stroke="#ccc" stroke-width="2" stroke-dasharray="8 4"/>`,
                        `  <text x="${w / 2}" y="40" text-anchor="middle" font-family="monospace" font-size="${Math.round(h / 20)}" fill="#bbb">${escape(filename)}</text>`,
                        textEls,
                        `</svg>`,
                      ].join("\n");
                      const dir = path.dirname(deliveryPath);
                      if (!fs.existsSync(dir)) fs.mkdirSync(dir, { recursive: true });
                      fs.writeFileSync(deliveryPath, svg);
                      filesToCommit.push(deliveryPath);
                      console.log(`Generated SVG placeholder: ${deliveryPath}`);
                    }
                  }
                }
              } else {
                // Create parent issue
                const parent = await github.rest.issues.create({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  title: fm.title || slug,
                  body: [
                    fm.summary || "",
                    "",
                    `**Slug:** \`${slug}\``,
                    `**Audience:** ${fm.audience || "unset"}`,
                    `**Date:** ${fm.date || "unset"}`,
                    "",
                    "Sub-issues: tracking (creation lifecycle) + discussion (maintenance lifecycle)",
                  ].join("\n"),
                  labels,
                });
                const parentNumber = parent.data.number;
                console.log(`Created parent issue #${parentNumber} for ${slug}`);

                // Create tracking sub-issue (creation lifecycle — closes on publish)
                const tracking = await github.rest.issues.create({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  title: `[tracking] ${fm.title || slug}`,
                  body: [
                    `Tracks the creation lifecycle for #${parentNumber}.`,
                    "",
                    "- [ ] Draft complete",
                    "- [ ] Ready to publish",
                    "",
                    "Close this issue when the post goes public.",
                  ].join("\n"),
                  labels: [slugLabel, "post-tracking", ...tagLabels],
                });
                console.log(`Created tracking issue #${tracking.data.number}`);

                // Create discussion sub-issue (maintenance lifecycle — stays open)
                const discussion = await github.rest.issues.create({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  title: `[discussion] ${fm.title || slug}`,
                  body: [
                    `Discussion for: #${parentNumber}`,
                    "",
                    fm.summary || "",
                    "",
                    `Post: https://thetube.today/posts/${slug}`,
                  ].join("\n"),
                  labels: [slugLabel, "discussion", ...tagLabels],
                });
                const discussionNumber = discussion.data.number;
                console.log(`Created discussion issue #${discussionNumber}`);

                // Parse [design]: blocks from post body (multi-line, blank-line terminated)
                const postBody = content.replace(/^---\n[\s\S]*?\n---\n/, "");
                const designBlocks = [];
                const bodyLines = postBody.split("\n");
                let bi = 0;
                while (bi < bodyLines.length) {
                  const dm = bodyLines[bi].match(/^\[design\]:\s*(.+)$/);
                  if (dm) {
                    const firstLine = dm[1].trim();
                    const extra = [];
                    bi++;
                    while (bi < bodyLines.length && bodyLines[bi].trim() !== "") {
                      extra.push(bodyLines[bi].trim());
                      bi++;
                    }
                    designBlocks.push({ firstLine, extra });
                  } else {
                    bi++;
                  }
                }

                const subNumbers = [tracking.data.number, discussionNumber];

                for (const block of designBlocks) {
                  const firstToken = block.firstLine.split(/[\s\u2014\u2013]/)[0];
                  const filename = firstToken.includes(".") ? firstToken : null;
                  const description = filename
                    ? block.firstLine.slice(filename.length).replace(/^\s*[\u2014\u2013-]\s*/, "")
                    : block.firstLine;
                  const fullBrief = [description, ...block.extra].filter(Boolean).join("\n");
                  const deliveryPath = filename
                    ? `public/images/posts/${slug}/${filename}`
                    : `public/images/posts/${slug}/`;

                  const designIssue = await github.rest.issues.create({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    title: `[design] ${filename || description}`,
                    body: [
                      `Design request for: #${parentNumber}`,
                      "",
                      "## Brief",
                      fullBrief,
                      "",
                      "## Delivery",
                      "Attach the file to this issue as a comment. Commit it to:",
                      `\`${deliveryPath}\``,
                      "",
                      "Close this issue when the file is committed.",
                    ].join("\n"),
                    labels: [slugLabel, "design", ...tagLabels],
                  });
                  subNumbers.push(designIssue.data.number);
                  console.log(`Created design issue #${designIssue.data.number}: ${block.firstLine}`);

                  // Generate SVG placeholder (only if file doesn't already exist)
                  if (filename && !fs.existsSync(deliveryPath)) {
                    const dimMatch = fullBrief.match(/(\d+)[x\u00d7](\d+)/i);
                    const w = dimMatch ? parseInt(dimMatch[1]) : 1200;
                    const h = dimMatch ? parseInt(dimMatch[2]) : 630;
                    const escape = s => s.replace(/[<>&"]/g, c => ({ "<": "&lt;", ">": "&gt;", "&": "&amp;", '"': "&quot;" }[c]));
                    const briefText = escape(fullBrief.replace(/\n/g, " "));
                    const words = briefText.split(" ");
                    const briefLines = [];
                    let line = "";
                    for (const word of words) {
                      if ((line + " " + word).trim().length > 55) { briefLines.push(line.trim()); line = word; }
                      else { line = (line + " " + word).trim(); }
                    }
                    if (line) briefLines.push(line);
                    const lineH = Math.round(h / 18);
                    const startY = Math.round(h / 2) - Math.round((briefLines.length - 1) * lineH / 2);
                    const textEls = briefLines.map((l, i) =>
                      `  <text x="${w / 2}" y="${startY + i * lineH}" text-anchor="middle" font-family="sans-serif" font-size="${Math.round(lineH * 0.7)}" fill="#888">${l}</text>`
                    ).join("\n");
                    const svg = [
                      `<svg xmlns="http://www.w3.org/2000/svg" width="${w}" height="${h}" viewBox="0 0 ${w} ${h}">`,
                      `  <rect width="${w}" height="${h}" fill="#f5f5f5"/>`,
                      `  <rect x="4" y="4" width="${w - 8}" height="${h - 8}" fill="none" stroke="#ccc" stroke-width="2" stroke-dasharray="8 4"/>`,
                      `  <text x="${w / 2}" y="40" text-anchor="middle" font-family="monospace" font-size="${Math.round(h / 20)}" fill="#bbb">${escape(filename)}</text>`,
                      textEls,
                      `</svg>`,
                    ].join("\n");
                    const dir = path.dirname(deliveryPath);
                    if (!fs.existsSync(dir)) fs.mkdirSync(dir, { recursive: true });
                    fs.writeFileSync(deliveryPath, svg);
                    filesToCommit.push(deliveryPath);
                    console.log(`Generated SVG placeholder: ${deliveryPath}`);
                  }
                }

                // Link sub-issues to parent via GitHub sub-issues API
                for (const subNumber of subNumbers) {
                  try {
                    await github.request("POST /repos/{owner}/{repo}/issues/{issue_number}/sub_issues", {
                      owner: context.repo.owner,
                      repo: context.repo.repo,
                      issue_number: parentNumber,
                      sub_issue_id: subNumber,
                    });
                  } catch (e) {
                    // Sub-issues API may not be available on all plans — log and continue
                    console.log(`Could not link sub-issue #${subNumber}: ${e.message}`);
                  }
                }

                // Write parent and discussion issue numbers back to frontmatter
                const updated = content.replace(
                  /^(---\n[\s\S]*?)(---)/,
                  (_, fmBlock, close) => {
                    let block = fmBlock;
                    block = block.includes("issueNumber:")
                      ? block.replace(/issueNumber:.*\n/, `issueNumber: ${parentNumber}\n`)
                      : `${block}issueNumber: ${parentNumber}\n`;
                    block = block.includes("discussionNumber:")
                      ? block.replace(/discussionNumber:.*\n/, `discussionNumber: ${discussionNumber}\n`)
                      : `${block}discussionNumber: ${discussionNumber}\n`;
                    return `${block}${close}`;
                  }
                );
                fs.writeFileSync(file, updated);
                filesToCommit.push(file);
              }
            }

            if (filesToCommit.length > 0) {
              const { execSync: exec } = require("child_process");
              exec('git config user.name "github-actions[bot]"');
              exec('git config user.email "github-actions[bot]@users.noreply.github.com"');

              // Frontmatter (issue numbers) — skip ci, no deploy needed
              const fmFiles = filesToCommit.filter(f => f.endsWith(".md"));
              // SVG placeholders — no skip, deploy picks them up
              const svgFiles = filesToCommit.filter(f => !f.endsWith(".md"));

              if (fmFiles.length > 0) {
                exec(`git add ${fmFiles.join(" ")}`);
                exec('git commit -m "chore: write issue numbers to frontmatter [skip ci]"');
              }
              if (svgFiles.length > 0) {
                exec(`git add ${svgFiles.join(" ")}`);
                exec('git commit -m "chore: add SVG placeholders for design issues"');
              }
              exec("git push");
            }
