name: Aggregate index.json

on:
  workflow_dispatch:

jobs:
  aggregate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Generate index.json
        run: node scripts/aggregate-site.mjs

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Sync index.json to S3
        run: aws s3 cp index.json s3://${{ secrets.S3_BUCKET }}/index.json

      - name: Commit index.json
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add index.json
          git diff --staged --quiet || git commit -m "release: update index.json" && git push
